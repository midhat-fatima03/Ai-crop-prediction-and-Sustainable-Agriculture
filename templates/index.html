<!DOCTYPE html>
<html>
<head>
    <title>AI Crop Recommendation</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #43cea2, #185a9d);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .container {
            max-width: 900px;
        }

        .form-card {
            background: white;
            color: #333;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: slideUp 1s ease;
        }

        h1 {
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            font-weight: 500;
        }

        input {
            border-radius: 10px !important;
            transition: 0.3s;
        }

        input:focus {
            border-color: #43cea2;
            box-shadow: 0 0 8px rgba(67, 206, 162, 0.5);
        }

        .btn-custom {
            background: linear-gradient(135deg, #43cea2, #185a9d);
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 10px;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Animation */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h1>🌱 AI Crop Recommendation System</h1>

    <div class="form-card">

        <form action="/predict" method="POST">

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>N (Nitrogen)</label>
                    <input type="number" name="N" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>P (Phosphorus)</label>
                    <input type="number" name="P" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>K (Potassium)</label>
                    <input type="number" name="K" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Temperature (°C)</label>
                    <input type="number" step="any" name="temperature" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Humidity (%)</label>
                    <input type="number" step="any" name="humidity" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>pH</label>
                    <input type="number" step="any" name="ph" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Rainfall (mm)</label>
                    <input type="number" step="any" name="rainfall" class="form-control" required>
                </div>
            </div>

            <div class="text-center mt-3">
                <button type="submit" class="btn btn-custom">🚀 Predict Crop</button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
