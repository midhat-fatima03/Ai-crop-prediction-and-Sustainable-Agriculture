<!DOCTYPE html>
<html>
<head>
    <title>AI Crop Recommendation Result</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4CAF50, #81C784);
            color: #333;
        }

        .container {
            max-width: 800px;
        }

        .card-box {
            border-radius: 20px;
            padding: 30px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease-in;
        }

        h2 {
            color: #2e7d32;
            font-weight: bold;
        }

        h4 {
            color: #388e3c;
            font-weight: bold;
        }

        img {
            border-radius: 12px;
            margin-top: 10px;
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.05);
        }

        .btn {
            background-color: #2e7d32;
            color: white;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #1b5e20;
            color: white;
            transform: scale(1.05);
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4 text-white">🌱 AI Crop Recommendation Result</h2>

    <div class="card-box">

        <h4>🌾 Recommended Crop: {{ crop }}</h4>

        <h5 class="mt-3">📊 Your Input Values:</h5>
        <ul class="list-group">
            {% for key, value in explanation.items() %}
                {% if key != 'Reason' %}
                <li class="list-group-item d-flex justify-content-between">
                    <strong>{{ key }}</strong>
                    <span>{{ value }}</span>
                </li>
                {% endif %}
            {% endfor %}
        </ul>

        <p class="mt-3"><strong>💡 Insight:</strong> {{ explanation['Reason'] }}</p>

        <h5 class="mt-4">📈 Model Graphs:</h5>

        <!-- Accuracy Graph -->
        <img src="{{ url_for('static', filename=accuracy_graph) }}" class="img-fluid">

        <!-- Feature Importance Graph -->
        <img src="{{ url_for('static', filename=feature_graph) }}" class="img-fluid">

        <div class="text-center mt-4">
            <a href="/" class="btn px-4 py-2">🔁 Try Again</a>
        </div>

    </div>

</div>

</body>
</html>
